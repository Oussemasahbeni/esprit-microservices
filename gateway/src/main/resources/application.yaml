spring:
  application:
    name: gateway
  config:
    import: consul:${CONSUL_HOST:localhost}:${CONSUL_PORT:8500}
  cloud:
    consul:
      config:
        enabled: true
        format: YAML
        prefixes: config
        default-context: application

resilience4j:
  circuitbreaker:
    configs:
      default:
        # how many calls to track in the sliding window
        sliding-window-size: 10
        # minimum calls before CB can open
        minimum-number-of-calls: 5
        # % of failures that trips the circuit open
        failure-rate-threshold: 50
        # how long to stay OPEN before trying again (HALF-OPEN)
        wait-duration-in-open-state: 10s
        # how many calls allowed in HALF-OPEN state
        permitted-number-of-calls-in-half-open-state: 3
        # also trip on slow calls
        slow-call-rate-threshold: 50
        # how long a call must take before we count it as slow
        slow-call-duration-threshold: 2s

logging:
  level:
    org.springframework.cloud.gateway: trace
    org.springframework.security: trace