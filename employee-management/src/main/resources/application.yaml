spring:
  application:
    name: employee-management
  config:
    import: consul:${CONSUL_HOST:localhost}:${CONSUL_PORT:8500}
  cloud:
    consul:
      config:
        enabled: true
        format: YAML
        prefixes: config
        default-context: application
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:employee_management_db}
    username: ${DB_USERNAME:employee_user}
    password: ${DB_PASSWORD:employee_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9000/realms/esprit}

keycloak:
  realm: esprit
  client-id: esprit-backend
  client-secret: ${KEYCLOAK_CLIENT_SECRET:AiNueJFw2my49qMg16Cp3RMD2cNyoYHx}
  server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9000}
  frontend-client-id: esprit-frontend

springdoc:
  swagger-ui:
    operationsSorter: method
    display-request-duration: true

server:
  port: 8084
