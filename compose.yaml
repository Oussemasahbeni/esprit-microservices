services:

  # ── Shared infrastructure ────────────────────────────────────────────────

  consul:
    image: hashicorp/consul:1.22
    container_name: consul
    ports:
      - "8500:8500"      # UI + HTTP API
      - "8600:8600/udp"  # DNS
    command: "agent -server -bootstrap-expect=1 -ui -client=0.0.0.0 -data-dir=/consul/data"
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-esprit
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI -> http://localhost:15672 (guest / guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    image: postgres:18-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "keycloak", "-d", "keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: keycloak-esprit
    ports:
      - "9000:8080"  # web interface
      - "9001:9000"  # health check
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./keycloak/kc-providers/jars:/opt/keycloak/providers/
      - ./keycloak/kc-realm:/opt/keycloak/data/import/
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ready" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  mail-dev:
    image: maildev/maildev
    container_name: mail-dev-esprit
    ports:
      - "1080:1080"
      - "1025:1025"

  # ── Per-microservice databases ───────────────────────────────────────────

  reservation-postgres:
    image: postgres:18-alpine
    container_name: reservation-postgres
    environment:
      POSTGRES_USER: reservation_user
      POSTGRES_PASSWORD: reservation_pass
      POSTGRES_DB: reservation_db
    volumes:
      - reservation_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "reservation_user", "-d", "reservation_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  employee-postgres:
    image: postgres:18-alpine
    container_name: employee-postgres
    environment:
      POSTGRES_USER: employee_user
      POSTGRES_PASSWORD: employee_pass
      POSTGRES_DB: employee_management_db
    volumes:
      - employee_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "employee_user", "-d", "employee_management_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  delivery-postgres:
    image: postgres:18-alpine
    container_name: delivery-postgres
    environment:
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_pass
      POSTGRES_DB: delivery_management_db
    volumes:
      - delivery_postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "delivery_user", "-d", "delivery_management_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  menu-mysql:
    image: mysql:8.4
    container_name: menu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: menu_management_db
    ports:
      - "3306:3306"
    volumes:
      - menu_mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Microservices ─────────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/esprit
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  reservation:
    build:
      context: .
      dockerfile: reservation/Dockerfile
    container_name: reservation-service
    ports:
      - "8083:8083"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: reservation-postgres
      DB_PORT: 5432
      DB_USERNAME: reservation_user
      DB_PASSWORD: reservation_pass
      RABBITMQ_HOST: rabbitmq
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      reservation-postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  employee-management:
    build:
      context: .
      dockerfile: employee-management/Dockerfile
    container_name: employee-management-service
    ports:
      - "8084:8084"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: employee-postgres
      DB_PORT: 5432
      DB_USERNAME: employee_user
      DB_PASSWORD: employee_pass
      RABBITMQ_HOST: rabbitmq
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/esprit
      KEYCLOAK_SERVER_URL: http://keycloak:8080
    depends_on:
      employee-postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  menu-management:
    build:
      context: .
      dockerfile: menu-management/Dockerfile
    container_name: menu-management-service
    ports:
      - "8085:8085"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: menu-mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: password
      RABBITMQ_HOST: rabbitmq
    depends_on:
      menu-mysql:
        condition: service_healthy
      consul:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  delivery-management:
    build:
      context: .
      dockerfile: delivery-management/Dockerfile
    container_name: delivery-management-service
    ports:
      - "8086:8086"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: delivery-postgres
      DB_PORT: 5432
      DB_USERNAME: delivery_user
      DB_PASSWORD: delivery_pass
    depends_on:
      delivery-postgres:
        condition: service_healthy
      consul:
        condition: service_healthy

volumes:
  consul_data:
  keycloak_postgres_data:
  reservation_postgres_data:
  employee_postgres_data:
  delivery_postgres_data:
  menu_mysql_data:
