  #    ports:
  #      - "4566:4566"
  #    environment:
  #      - SERVICES=s3
  #      - DOCKER_HOST=unix:///var/run/docker.sock
  #    volumes:
  #      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
  #      - "/var/run/docker.sock:/var/run/docker.sock"

  reservation-postgres:
    container_name: reservation-postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: reservation_user
      POSTGRES_PASSWORD: reservation_pass
      POSTGRES_DB: reservation_db
    volumes:
      - reservation_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "reservation_user", "-d", "reservation_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  menu-mysql:
    container_name: menu-mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: menu_management_db
    ports:
      - "3306:3306"
    volumes:
      - menu_mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 10

