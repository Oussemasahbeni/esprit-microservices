services:

  # ── Shared infrastructure ────────────────────────────────────────────────

  consul:
    image: hashicorp/consul:1.22
    container_name: consul
    ports:
      - "8500:8500"      # UI + HTTP API
      - "8600:8600/udp"  # DNS
    command:
      - "agent"
      - "-server"
      - "-bootstrap-expect=1"
      - "-ui"
      - "-client=0.0.0.0"
      - "-data-dir=/consul/data"
      - '-hcl=server_rejoin_age_max = "8760h"'
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-esprit
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI -> http://localhost:15672 (guest / guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    image: postgres:18-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    ports:
      - "5431:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "keycloak", "-d", "keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: keycloak-esprit
    ports:
      - "9000:8080"  # web interface
      - "9001:9000"  # health check
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Pins the issuer/token URLs to http://localhost:9000 regardless of the
      # internal Host header a backend container used to reach this server —
      # so browser-issued tokens and backend token validation agree on the
      # same issuer even though backends reach Keycloak via the "keycloak"
      # service name on port 8080 internally. No client secret changes needed.
      KC_HOSTNAME: http://localhost:9000
    volumes:
      - ./keycloak/kc-providers/jars:/opt/keycloak/providers/
      - ./keycloak/kc-realm:/opt/keycloak/data/import/
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep 'HTTP/1.1 200' <&3" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  mail-dev:
    image: maildev/maildev
    container_name: mail-dev-esprit
    ports:
      - "1080:1080"
      - "1025:1025"

  app-postgres:
    image: postgres:18-alpine
    container_name: app-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - app_postgres_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  menu-mysql:
    image: mysql:8.4
    container_name: menu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: menu_management_db
    ports:
      - "3306:3306"
    volumes:
      - menu_mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: seeds Consul KV from consul-kv.json on every `docker compose up`,
  # so a fresh checkout/git pull never needs a manual `consul kv import`.
  consul-kv-init:
    image: node:22-alpine
    container_name: consul-kv-init
    working_dir: /app
    volumes:
      - ./scripts/import-consul-kv.js:/app/import-consul-kv.js
      - ./consul-kv.json:/app/consul-kv.json
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      CONSUL_KV_FILE: /app/consul-kv.json
    command: [ "node", "/app/import-consul-kv.js" ]
    depends_on:
      consul:
        condition: service_healthy
    restart: "no"

  # ── App services ─────────────────────────────────────────────────────────
  # Regular bridge networking — every service talks to infra by Docker
  # service name (consul, app-postgres, menu-mysql, rabbitmq, keycloak), not
  # "localhost". Only the browser-facing pieces (gateway, frontend, keycloak,
  # consul UI) are published to the host on their usual ports.
  #
  # Keycloak issuer: KC_HOSTNAME above pins every issued token's `iss` claim
  # to http://localhost:9000/realms/esprit, so KEYCLOAK_ISSUER_URI below stays
  # unchanged from the local-IDE value — no client secret/redirect URI
  # changes. Signature verification (an actual network call for the JWKS)
  # is pointed at the internal address via KEYCLOAK_JWK_SET_URI, decoupled
  # from issuer validation via Spring Boot's standard
  # jwk-set-uri + issuer-uri combination (see gateway/employee-management/
  # delivery-management config in consul-kv.json).
  #
  # Images are pre-built, NOT built by compose (`image:` only, no `build:`).
  # After `git pull`, build/refresh an image locally with the matching
  # Dockerfile, e.g.:
  #   docker build -f gateway/Dockerfile -t esprit-microservices-gateway .
  # Same image name here = compose picks it up on the next `up`.

  gateway:
    image: esprit-microservices-gateway:latest
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      KEYCLOAK_ISSUER_URI: http://localhost:9000/realms/esprit
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/esprit/protocol/openid-connect/certs
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      consul-kv-init:
        condition: service_completed_successfully
    restart: unless-stopped

  reservation:
    image: esprit-microservices-reservation:latest
    container_name: reservation-service
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DB_HOST: app-postgres
      DB_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      consul:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      consul-kv-init:
        condition: service_completed_successfully
    restart: unless-stopped

  employee-management:
    image: esprit-microservices-employee-management:latest
    container_name: employee-management-service
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DB_HOST: app-postgres
      DB_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      KEYCLOAK_ISSUER_URI: http://localhost:9000/realms/esprit
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/esprit/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      consul-kv-init:
        condition: service_completed_successfully
    restart: unless-stopped

  menu-management:
    image: esprit-microservices-menu-management:latest
    container_name: menu-management-service
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DB_HOST: menu-mysql
      DB_PORT: "3306"
      RABBITMQ_HOST: rabbitmq
    depends_on:
      consul:
        condition: service_healthy
      menu-mysql:
        condition: service_healthy
      consul-kv-init:
        condition: service_completed_successfully
    restart: unless-stopped

  delivery-management:
    image: esprit-microservices-delivery-management:latest
    container_name: delivery-management-service
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      DB_HOST: app-postgres
      DB_PORT: "5432"
      RABBITMQ_HOST: rabbitmq
      KEYCLOAK_ISSUER_URI: http://localhost:9000/realms/esprit
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/esprit/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
    depends_on:
      consul:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul-kv-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ai-service:
    image: esprit-ai-service:latest
    container_name: ai-service
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: "8500"
      SERVICE_HOST: ai-service
      KEYCLOAK_ISSUER_URI: http://localhost:9000/realms/esprit
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/esprit/protocol/openid-connect/certs
    depends_on:
      consul:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      consul-kv-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    image: esprit-microservices-frontend:latest
    container_name: esprit-frontend
    ports:
      - "4200:4200"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  consul_data:
  keycloak_postgres_data:
  app_postgres_data:
  menu_mysql_data:
